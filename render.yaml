databases:
  # ---------------------------------------------------------------------------
  # 1. Base de Datos (PostgreSQL + PostGIS)
  # ---------------------------------------------------------------------------
  - name: mibici-db
    plan: free
    postgresMajorVersion: 16

services:

  # ---------------------------------------------------------------------------
  # 2. Backend API (FastAPI)
  # ---------------------------------------------------------------------------
  - type: web
    name: mibici-api
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mibici-db
          property: connectionString
      - key: GBFS_BASE_URL
        value: "https://guadalajara.publicbikesystem.net/customer/gbfs/v3.0"
      - key: TIMEZONE
        value: "America/Mexico_City"




