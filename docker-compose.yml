# =============================================================================
# MiBici Sonora — Docker Compose (Edge Computing Architecture)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Edge Profile
  # ---------------------------------------------------------------------------
  postgres_local:
    image: postgis/postgis:16-3.4
    profiles: [edge]
    environment:
      POSTGRES_DB: mibici_audit
      POSTGRES_USER: mibici
      POSTGRES_PASSWORD: mibici_dev
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_VOLUME_PATH:-./postgres_data}:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mibici -d mibici_audit"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend/worker
    image: mibici-worker:latest
    profiles: [edge]
    environment:
      - LOCAL_DB_URL=${LOCAL_DB_URL}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - SECRET_TOKEN=${SECRET_TOKEN}
      - GBFS_BASE_URL=${GBFS_BASE_URL:-https://guadalajara.publicbikesystem.net/customer/gbfs/v3.0}
      - TIMEZONE=${TIMEZONE:-America/Mexico_City}
    depends_on:
      postgres_local:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # API Profile
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    image: mibici-backend:latest
    profiles: [api]
    environment:
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - TIMEZONE=${TIMEZONE:-America/Mexico_City}
    ports:
      - "8000:8000"

  # ---------------------------------------------------------------------------
  # Web Profile
  # ---------------------------------------------------------------------------
  frontend:
    build: ./frontend
    profiles: [web]
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
